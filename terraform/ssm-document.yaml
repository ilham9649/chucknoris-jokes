---
schemaVersion: '2.2'
description: 'Chuck Norris Jokes - Setup and deploy application'
parameters:
  S3Bucket:
    type: String
    description: 'S3 bucket containing application files'
    default: ''
  S3Object:
    type: String
    description: 'S3 object name for application files'
    default: 'app-files.tar.gz'
  S3Tarball:
    type: String
    description: 'S3 tarball name'
    default: 'app-files.tar.gz'
  Region:
    type: String
    description: 'AWS region'
    default: 'us-east-1'
mainSteps:
  - name: installDependencies
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "========================================="
        - echo "  Chuck Norris Jokes - Setup Script"
        - echo "========================================="
        - echo "[$(date +%H:%M:%S)] Installing dependencies..."
        - sudo yum install -y yum-utils curl git
  - name: installDocker
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Installing Docker..."
        - sudo rm -f /etc/yum.repos.d/docker-ce.repo
        - sudo amazon-linux-extras install docker -y
        - sudo yum install -y docker
        - sudo systemctl start docker
        - sudo systemctl enable docker
        - sudo usermod -aG docker ec2-user
  - name: installDockerCompose
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Installing Docker Compose (standalone)..."
        - curl -SL "https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-linux-x86_64" -o /tmp/docker-compose
        - sudo chmod +x /tmp/docker-compose
        - sudo mv /tmp/docker-compose /usr/local/bin/docker-compose
        - export PATH="/usr/local/bin:$PATH"
  - name: createAppDirectory
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Creating application directory..."
        - sudo mkdir -p /opt/chucknoris-jokes
        - sudo chown ec2-user /opt/chucknoris-jokes
  - name: downloadAppFiles
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Downloading application files from S3..."
        - aws s3 cp "s3://{{ S3Bucket }}/{{ S3Object }}" /opt/chucknoris-jokes/app-files.tar.gz --region "{{ Region }}"
  - name: extractAppFiles
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Extracting application files..."
        - cd /opt/chucknoris-jokes
        - tar -xzf app-files.tar.gz
        - rm app-files.tar.gz
  - name: buildDockerImages
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Building Docker images..."
        - cd /opt/chucknoris-jokes/docker
        - docker-compose build
  - name: deployContainers
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - cd /opt/chucknoris-jokes/docker
        - echo "[$(date +%H:%M:%S)] Stopping old containers..."
        - docker-compose down || true
        - echo "[$(date +%H:%M:%S)] Starting containers..."
        - docker-compose up -d
  - name: waitForFlaskApp
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Waiting for Flask app..."
        - sleep 10
        - |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            if docker ps | grep -q "chucknoris-jokes-app"; then
              echo "[$(date +%H:%M:%S)] Flask app is running!"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "[$(date +%H:%M:%S)] Waiting for Flask... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep 5
          done
          if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
            echo "[$(date +%H:%M:%S)] ERROR: Flask app not running"
            docker-compose logs
            exit 1
          fi
  - name: waitForNginx
    action: 'aws:runShellScript'
    inputs:
      runCommand:
        - echo "[$(date +%H:%M:%S)] Waiting for nginx..."
        - sleep 5
        - |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            if curl -f http://localhost/health > /dev/null 2>&1; then
              echo "[$(date +%H:%M:%S)] nginx is healthy!"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "[$(date +%H:%M:%S)] Waiting for nginx... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep 3
          done
          if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
            echo "[$(date +%H:%M:%S)] ERROR: nginx not healthy"
            docker-compose logs
            exit 1
          fi
        - echo "========================================="
        - echo "  Chuck Norris Jokes - Deployment Complete!"
        - echo "========================================="
        - echo "  Application URL: http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)"
        - echo "========================================="
