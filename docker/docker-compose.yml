version: '3.8'

services:
  app:
    build:
      context: ../app
      dockerfile: ../docker/Dockerfile
    container_name: chucknoris-jokes-app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: chucknoris-jokes-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
